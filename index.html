<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Core Explorer</title>

<!-- Modern Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root { 
    --cyan: #00e5ff; 
    --cyan-glow: rgba(0, 229, 255, 0.4);
    --bg-dark: #0f1115; 
    --card-bg: rgba(255, 255, 255, 0.03); 
    --card-border: rgba(255, 255, 255, 0.08);
    --text-main: #e2e8f0;
    --text-muted: #94a3b8;
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1d24 0%, var(--bg-dark) 100%);
    color: var(--text-main);
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
}

.container { 
    max-width: 1200px; 
    margin: auto; 
}

h1 {
    text-align: center;
    color: #ffffff;
    font-weight: 800;
    font-size: 2.5rem;
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-shadow: 0 0 20px var(--cyan-glow);
}

h1 span {
    color: var(--cyan);
}

/* --- TABS --- */
.tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
    background: rgba(0, 0, 0, 0.2);
    padding: 8px;
    border-radius: 50px;
    width: fit-content;
    margin-inline: auto;
    border: 1px solid var(--card-border);
}

.tab {
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    color: var(--text-muted);
}

.tab:hover {
    color: #ffffff;
    background: rgba(255, 255, 255, 0.05);
}

.tab.active {
    background: var(--cyan);
    color: #000000;
    box-shadow: 0 0 15px var(--cyan-glow);
}

/* --- GRID & CARDS --- */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    /* Animation for when cards load */
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Glowing top border on hover */
.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; 
    width: 100%; height: 3px;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
}

.card:hover { 
    transform: translateY(-5px);
    border-color: rgba(0, 229, 255, 0.3);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--cyan-glow);
}

.card:hover::before {
    transform: scaleX(1);
}

.name {
    font-size: 1.4rem;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.desc {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 20px;
}

/* --- DATA SECTIONS --- */
.section {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--cyan);
    margin: 16px 0 8px;
    font-weight: 800;
}

.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0, 229, 255, 0.08);
    color: var(--cyan);
    border: 1px solid rgba(0, 229, 255, 0.2);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
}

.tag strong {
    color: #ffffff;
    font-weight: normal;
}
</style>
</head>

<body>

<div class="container">
    <h1>META CORE <span>EXPLORER</span></h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('abilities', this)">Abilities</div>
        <div class="tab" onclick="switchTab('ores', this)">Ores</div>
        <div class="tab" onclick="switchTab('structures', this)">Structures</div>
        <div class="tab" onclick="switchTab('entities', this)">Entities</div>
    </div>

    <div id="content" class="grid"></div>
</div>

<script>
// ================= DATA SYSTEM =================

const DATA = {
    abilities: [
        {
            name: "Super Strength",
            desc: "Increases melee damage massively.",
            scaling: { damage: "base * (level / 10)", knockback: "level * 0.2" },
            visuals: { aura: "red", particles: "impact_shockwave" },
            tags: ["passive", "combat"]
        },
        {
            name: "Super Speed",
            desc: "Move at extreme speeds.",
            scaling: { speed: "base + (level * 0.5)" },
            visuals: { trailColor: "yellow", lightning: true },
            tags: ["movement"]
        },
        {
            name: "Web Swing",
            desc: "Swing using web physics.",
            mechanics: { range: 40, velocity: 2 },
            tags: ["movement"]
        }
    ],
    ores: [
        {
            name: "Titanium Ore",
            desc: "High-tier crafting material.",
            spawn: { dimension: "overworld", y: "-40 to 20", rarity: "uncommon" },
            drops: ["titanium_ingot"]
        },
        {
            name: "Kryptonite",
            desc: "Radioactive mineral from crashed meteors.",
            spawn: { structure: "Kryptonite Meteor", rarity: "rare" },
            drops: ["kryptonite_shard"]
        },
        {
            name: "Blue Kryptonite",
            desc: "A unique isotopic variation of kryptonite.",
            spawn: { structure: "Blue Kryptonite Meteor", rarity: "very rare" },
            drops: ["blue_kryptonite_shard"]
        }
    ],
    structures: [
        {
            name: "Kryptonite Meteor",
            desc: "A fallen radioactive rock from space.",
            spawn: { dimension: "overworld", biome: "plains" },
            contains: ["kryptonite"]
        },
        {
            name: "Blue Kryptonite Meteor",
            desc: "A rare variant of fallen space debris.",
            spawn: { dimension: "overworld", biome: "plains" },
            contains: ["blue kryptonite"]
        }
    ],
    entities: [
        {
            name: "Radioactive Spider",
            desc: "A glowing arachnid with mutating venom.",
            spawn: { biome: "forest", light_level: "low" },
            drops: ["radioactive_gland"]
        }
    ]
};

// ================= LOGIC =================

// Helper function to render UI sections cleanly
function buildSection(title, data) {
    if (!data) return "";
    
    let html = `<div class="section">${title}</div><div class="tags-container">`;
    
    if (Array.isArray(data)) {
        data.forEach(val => {
            html += `<div class="tag">${val}</div>`;
        });
    } else {
        Object.entries(data).forEach(([k, v]) => {
            html += `<div class="tag"><strong>${k}:</strong> ${v}</div>`;
        });
    }
    
    html += `</div>`;
    return html;
}

function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render(tab);
}

function render(tab) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    DATA[tab].forEach((item, index) => {
        let extra = "";

        // Dynamically build sections based on available data keys
        if (item.scaling) extra += buildSection("Scaling", item.scaling);
        if (item.mechanics) extra += buildSection("Mechanics", item.mechanics);
        if (item.visuals) extra += buildSection("Visuals", item.visuals);
        if (item.spawn) extra += buildSection("Spawn Limits", item.spawn);
        if (item.contains) extra += buildSection("Loot / Contains", item.contains);
        if (item.drops) extra += buildSection("Drops", item.drops);
        if (item.abilities) extra += buildSection("Abilities", item.abilities);
        if (item.tags) extra += buildSection("Tags", item.tags);

        // Create card element
        const card = document.createElement("div");
        card.className = "card";
        // Stagger the animation slightly for each card
        card.style.animationDelay = `${index * 0.05}s`;
        
        card.innerHTML = `
            <div class="name">${item.name}</div>
            <div class="desc">${item.desc}</div>
            ${extra}
        `;
        
        container.appendChild(card);
    });
}

// Initialize default view
render("abilities");

</script>

</body>
</html>
