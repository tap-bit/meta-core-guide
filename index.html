<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Core Explorer</title>

<style>
:root { --cyan:#00d4ff; --bg:#0a0a0a; --card:#141414; --border:#333; }

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:#e0e0e0;
    padding:20px;
}

.container { max-width:1100px; margin:auto; }

h1 {
    text-align:center;
    color:var(--cyan);
    letter-spacing:3px;
}

.tabs {
    display:flex;
    gap:10px;
    justify-content:center;
    margin:20px 0;
}

.tab {
    padding:10px 20px;
    border:1px solid var(--border);
    cursor:pointer;
    border-radius:6px;
}

.tab.active {
    border-color:var(--cyan);
    color:var(--cyan);
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:15px;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    transition:0.2s;
}

.card:hover { border-color:var(--cyan); }

.name {
    font-weight:bold;
    color:var(--cyan);
}

.section {
    font-size:0.8rem;
    color:#aaa;
    margin-top:5px;
}

.desc {
    margin-top:10px;
    font-size:0.9rem;
}

.tag {
    display:inline-block;
    background:#222;
    border:1px solid #444;
    padding:3px 6px;
    margin:3px 3px 0 0;
    border-radius:4px;
    font-size:0.7rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>META CORE EXPLORER</h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('abilities', this)">Abilities</div>
        <div class="tab" onclick="switchTab('ores', this)">Ores</div>
        <div class="tab" onclick="switchTab('structures', this)">Structures</div>
        <div class="tab" onclick="switchTab('entities', this)">Entities</div>
    </div>

    <div id="content" class="grid"></div>
</div>

<script>

// ================= DATA SYSTEM =================

const DATA = {

abilities: [
{
    name: "Super Strength",
    desc: "Increases melee damage massively.",
    
    scaling: {
        damage: "base * (level / 10)",
        knockback: "level * 0.2"
    },

    visuals: {
        aura: "red",
        particles: "impact_shockwave"
    },

    tags: ["passive", "combat"]
},

{
    name: "Super Speed",
    desc: "Move at extreme speeds.",
    
    scaling: {
        speed: "base + (level * 0.5)"
    },

    visuals: {
        trailColor: "yellow",
        lightning: true
    },

    tags: ["movement"]
},

{
    name: "Web Swing",
    desc: "Swing using web physics.",

    mechanics: {
        range: 40,
        velocity: 2
    },

    tags: ["movement"]
}
],


// ================= ORES =================

ores: [
{
    name: "Titanium Ore",
    desc: "High-tier crafting material.",

    spawn: {
        dimension: "overworld",
        y: "-40 to 20",
        rarity: "uncommon"
    },

    drops: ["titanium_ingot"]
},

{
    name: "Celestial Crystal",
    desc: "Energy-based rare mineral.",

    spawn: {
        structure: "Meteor Crash",
        rarity: "rare"
    },

    drops: ["celestial_shard"]
}
],


// ================= STRUCTURES =================

structures: [
{
    name: "Abandoned Lab",
    desc: "Contains injections and tech.",

    spawn: {
        dimension: "overworld",
        rarity: "rare"
    },

    contains: ["injections", "loot crates"]
},

{
    name: "Meteor Crash",
    desc: "Crash site with celestial materials.",

    spawn: {
        surface: true,
        rarity: "rare"
    },

    contains: ["celestial crystal"]
}
],


// ================= ENTITIES =================

entities: [
{
    name: "Energy Wraith",
    desc: "Hostile energy being.",

    spawn: {
        biome: "celestial",
        time: "night"
    },

    drops: ["energy_core"]
},

{
    name: "Test Subject",
    desc: "Mutated human.",

    spawn: {
        structure: "Abandoned Lab"
    },

    abilities: ["random powers"]
}
]

};


// ================= LOGIC =================

function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render(tab);
}

function render(tab) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    DATA[tab].forEach(item => {

        let extra = "";

        // ===== ABILITIES =====
        if(tab === "abilities") {
            if(item.scaling) {
                extra += `<div class="section">Scaling:</div>`;
                Object.entries(item.scaling).forEach(([k,v])=>{
                    extra += `<div class="tag">${k}: ${v}</div>`;
                });
            }

            if(item.visuals) {
                extra += `<div class="section">Visuals:</div>`;
                Object.entries(item.visuals).forEach(([k,v])=>{
                    extra += `<div class="tag">${k}: ${v}</div>`;
                });
            }
        }

        // ===== SPAWN SYSTEM =====
        if(item.spawn) {
            extra += `<div class="section">Spawn:</div>`;
            Object.entries(item.spawn).forEach(([k,v])=>{
                extra += `<div class="tag">${k}: ${v}</div>`;
            });
        }

        // ===== TAGS =====
        if(item.tags) {
            extra += `<div class="section">Tags:</div>`;
            item.tags.forEach(t=>{
                extra += `<div class="tag">${t}</div>`;
            });
        }

        container.innerHTML += `
            <div class="card">
                <div class="name">${item.name}</div>
                <div class="desc">${item.desc}</div>
                ${extra}
            </div>
        `;
    });
}

// init
render("abilities");

</script>

</body>
</html>
