<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Core Explorer</title>

<style>
:root { --cyan:#00d4ff; --bg:#0a0a0a; --card:#141414; --border:#333; }

body {
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:#e0e0e0;
    padding:20px;
}

.container {
    max-width:1100px;
    margin:auto;
}

h1 {
    text-align:center;
    color:var(--cyan);
    letter-spacing:3px;
}

.tabs {
    display:flex;
    gap:10px;
    justify-content:center;
    margin:20px 0;
}

.tab {
    padding:10px 20px;
    border:1px solid var(--border);
    cursor:pointer;
    border-radius:6px;
}

.tab.active {
    border-color:var(--cyan);
    color:var(--cyan);
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    transition:0.2s;
}

.card:hover {
    border-color:var(--cyan);
}

.name {
    font-weight:bold;
    color:var(--cyan);
}

.spawn {
    font-size:0.8rem;
    color:#aaa;
    margin-top:5px;
}

.desc {
    margin-top:10px;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>META CORE EXPLORER</h1>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('abilities', this)">Abilities</div>
        <div class="tab" onclick="switchTab('ores', this)">Ores</div>
        <div class="tab" onclick="switchTab('structures', this)">Structures</div>
        <div class="tab" onclick="switchTab('entities', this)">Entities</div>
    </div>

    <div id="content" class="grid"></div>
</div>

<script>
// ================= DATA =================

const DATA = {
    abilities: [
        {
            name: "Web Swing",
            desc: "Swing through the air using web physics.",
            spawn: "Unlocked via Spider DNA Injection"
        },
        {
            name: "Heat Vision",
            desc: "Fires a powerful laser beam from eyes.",
            spawn: "Kryptonian DNA / Suit Ability"
        },
        {
            name: "Super Speed",
            desc: "Move at extreme speeds with lightning aura.",
            spawn: "Speed Force Injection"
        }
    ],

    ores: [
        {
            name: "Titanium Ore",
            desc: "Used for high-tier suit crafting.",
            spawn: "Y: -40 to 20 (Overworld)"
        },
        {
            name: "Celestial Crystal",
            desc: "Rare energy source for advanced abilities.",
            spawn: "Meteor Structures"
        }
    ],

    structures: [
        {
            name: "Abandoned Lab",
            desc: "Contains injections and experimental tech.",
            spawn: "Overworld (rare)"
        },
        {
            name: "Meteor Crash",
            desc: "Source of celestial materials.",
            spawn: "Surface generation"
        }
    ],

    entities: [
        {
            name: "Test Subject",
            desc: "Mutated human with random abilities.",
            spawn: "Labs / Night spawn"
        },
        {
            name: "Energy Wraith",
            desc: "Hostile entity made of raw energy.",
            spawn: "Celestial zones"
        }
    ]
};

// ================= LOGIC =================

function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render(tab);
}

function render(tab) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    DATA[tab].forEach(item => {
        container.innerHTML += `
            <div class="card">
                <div class="name">${item.name}</div>
                <div class="spawn">Spawn: ${item.spawn}</div>
                <div class="desc">${item.desc}</div>
            </div>
        `;
    });
}

// init
render("abilities");
</script>

</body>
</html>
